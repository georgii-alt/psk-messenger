name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Buildozer and Dependencies
        run: |
          pip install buildozer cython==0.29.36
          sudo apt update
          sudo apt install -y openjdk-17-jdk libssl-dev cmake unzip zip autoconf libtool pkg-config zlib1g-dev libncurses5-dev

      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: psk-messenger-apk
          path: bin/*.apk
