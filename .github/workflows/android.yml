name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer and Dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython git+https://github.com
          sudo apt update
          sudo apt install -y openjdk-17-jdk libssl-dev cmake unzip zip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libffi-dev

      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: psk-messenger-apk
          path: bin/*.apk
