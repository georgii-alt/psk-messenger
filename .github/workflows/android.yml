name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Buildozer
        run: |
          pip install buildozer cython
          sudo apt update
          sudo apt install -y openjdk-17-jdk libssl-dev cmake unzip zip
      - name: Build with Buildozer
        run: |
          buildozer init
          sed -i 's|requirements = python3,kivy|requirements = python3,kivy==2.3.1,kivymd==1.2.0,requests|' buildozer.spec
          sed -i 's|title = My Application|title = PSK Messenger|' buildozer.spec
          buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: psk-messenger-apk
          path: bin/*.apk
